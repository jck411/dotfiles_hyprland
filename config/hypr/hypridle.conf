# Hypridle — OLED burn-in protection
# Blanks displays after inactivity via DPMS. Does NOT suspend/sleep.
# Timeout is sourced from power-settings.conf (SCREENSAVER_TIMEOUT).

general {
    lock_cmd = hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
}

# Screen off (DPMS) after 5 minutes of inactivity
listener {
    timeout = 300
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}
