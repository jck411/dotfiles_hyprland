# AUTO-GENERATED by apply-power-settings.sh — do not edit manually
# Dock state: docked | Screensaver: true | Auto-logoff: false

general {
    lock_cmd = hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
}

# Screen off (DPMS) after 180s
listener {
    timeout = 180
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}
