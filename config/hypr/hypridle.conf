# Hypridle — OLED burn-in protection (docked only)
# Blanks displays after inactivity via DPMS only when docked.
# When undocked, screen stays on permanently.

general {
    lock_cmd = hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
}

# Screen off (DPMS) after 5 minutes — only when docked
listener {
    timeout = 300
    on-timeout = ~/.config/scripts/dpms-if-docked.sh
    on-resume = hyprctl dispatch dpms on
}
